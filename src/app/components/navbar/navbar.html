<nav>
  <a routerLink="/" class="logo">
    <img src="assets/images/shared/logo.svg" alt="Logo" />
  </a>

  <ul class="links">
    @for (link of links; track link.path) {
      <li class="link-block">
        <a [routerLink]="link.path" class="link" routerLinkActive="active">
          <img
            [src]="'assets/images/shared/icon-nav-' + link.label + '.svg'"
            [alt]="link.altText"
          />
        </a>
      </li>
    }
  </ul>

  <div class="profile-container">
    <button class="profile-toggle" (click)="toggleMenu()" aria-label="Toggle user menu">
      <img src="assets/images/shared/image-avatar.png" alt="Profile Image" />
    </button>

    @if (isMenuOpen()) {
      <div class="profile-menu">
        <p class="user-email">{{ userEmail() }}</p>
        <hr class="divider" />

        <button class="logout-btn" (click)="logout()">Logout</button>
      </div>
    }
  </div>
</nav>
