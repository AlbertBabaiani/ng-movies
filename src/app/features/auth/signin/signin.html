<div class="auth-container">
  <img src="assets/images/shared/logo.svg" alt="Logo" class="logo" />

  <main class="auth-card">
    <h1>Login</h1>

    <form (ngSubmit)="onSubmit()">
      <div class="input-group">
        <input
          [class.filled]="email().trim().length"
          type="email"
          placeholder="Email address"
          [(ngModel)]="email"
          name="email"
          (input)="clearAuthError()"
          autocomplete="email"
          required
        />
        @if (email().length > 0 && !emailValid()) {
          <span class="error-msg">Please enter a valid email</span>
        }
      </div>

      <div class="input-group password-group">
        <input
          [class.filled]="password().trim().length"
          [type]="showPassword() ? 'text' : 'password'"
          placeholder="Password"
          [(ngModel)]="password"
          name="password"
          (input)="clearAuthError()"
          autocomplete="current-password"
          required
        />
        <button type="button" class="eye-btn" (click)="togglePassword()">
          <img
            [src]="
              showPassword()
                ? 'assets/images/shared/icon-eye-off.svg'
                : 'assets/images/shared/icon-eye.svg'
            "
            alt="toggle password"
          />
        </button>
      </div>

      @if (authError()) {
        <span class="error-msg auth-error">{{ authError() }}</span>
      }

      <button type="submit" class="submit-btn" [disabled]="!isFormValid()">
        Login to your account
      </button>
    </form>

    <p class="toggle-auth">
      Don't have an account?
      <a routerLink="/sign-up">Sign Up</a>
    </p>

    <p class="toggle-guest">
      <a class="guest-link" routerLink="/home"> Or continue as a guest </a>
    </p>
  </main>
</div>
