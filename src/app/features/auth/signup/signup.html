<div class="auth-container">
  <img src="assets/images/shared/logo.svg" alt="Logo" class="logo" />

  <main class="auth-card">
    <h1>Sign Up</h1>

    <form (ngSubmit)="onSubmit()">
      <div class="input-group">
        <input
          [class.filled]="email().trim().length"
          type="email"
          placeholder="Email address"
          [(ngModel)]="email"
          name="email"
          email
          required
        />
      </div>

      <div class="input-group password-group">
        <input
          [class.filled]="password().trim().length"
          [type]="showPassword() ? 'text' : 'password'"
          placeholder="Password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          required
        />
        <button type="button" class="eye-btn" (click)="togglePassword()">
          <img
            [src]="
              showPassword()
                ? 'assets/images/shared/icon-eye-off.svg'
                : 'assets/images/shared/icon-eye.svg'
            "
            alt="toggle password"
          />
        </button>
      </div>

      <div class="password-monitor" [class.visible]="password().length > 0">
        <p [class.valid]="passwordStatus().length">Min 6 characters</p>
        <p [class.valid]="passwordStatus().hasUpper">At least one uppercase</p>
        <p [class.valid]="passwordStatus().hasNumber">At least one number</p>
        <p [class.valid]="passwordStatus().noSpace">No whitespaces</p>
      </div>

      <div class="input-group">
        <input
          [class.filled]="repeatPassword().trim().length"
          [type]="showPassword() ? 'text' : 'password'"
          placeholder="Repeat password"
          [ngModel]="repeatPassword()"
          (ngModelChange)="repeatPassword.set($event)"
          name="repeatPassword"
          required
        />
      </div>

      @if (repeatPassword().length > 0 && password() !== repeatPassword()) {
        <span class="error-msg">Passwords do not match</span>
      }

      <button type="submit" class="submit-btn">Create an account</button>
    </form>

    <p class="toggle-auth">
      Already have an account
      <a routerLink="/sign-in">Login</a>
    </p>
  </main>
</div>
